# =============================================================================
# CAN-Tablo-Driver: HTTP API в Docker.
#
# Перед запуском:
#   1) Скопируйте пример: cp docker/etc/config.example.toml docker/etc/config.toml
#   2) Положите в docker/data/ шрифт и text-in.json (пути должны совпадать с config.toml).
#   3) При необходимости раскомментируйте devices: и подставьте numeric GID в group_add.
#
# Сборка и старт: docker compose up --build
# =============================================================================

services:
  can-tablo-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: can-tablo-driver:latest
    container_name: can-tablo-api

    # -------------------------------------------------------------------------
    # Сеть: SocketCAN (can0, vcan0) живёт в namespace хоста. Без host-сети
    # контейнер обычно не видит CAN-интерфейсы, даже при пробросе /dev.
    # На Docker Desktop (Mac/Windows) host network ведёт себя иначе — для CAN
    # обычно нужен Linux-хост.
    # -------------------------------------------------------------------------
    network_mode: host

    # -------------------------------------------------------------------------
    # Часовой пояс: только UTC (без монтирования /etc/localtime с хоста).
    # -------------------------------------------------------------------------
    environment:
      TZ: UTC
      CAN_TABLO_HOME: /opt/can-tablo
      UV_PROJECT: /opt/can-tablo

    # -------------------------------------------------------------------------
    # Тома: конфиг с хоста; данные (шрифты, JSON, логи) — в /opt/can-tablo/data.
    # Пути внутри config.toml должны указывать на /opt/can-tablo/data/...
    # -------------------------------------------------------------------------
    volumes:
      - ./docker/etc:/opt/can-tablo/etc:ro
      - ./docker/data:/opt/can-tablo/data:rw
      # Пример: смонтировать документацию API с хоста (опционально).
      # - ./docs:/opt/can-tablo/docs:ro

    # -------------------------------------------------------------------------
    # Пользователь non-root. UID/GID должны совпадать с useradd в Dockerfile (1000)
    # или измените оба места. На Linux можно задать: user: "${UID}:${GID}" и
    # экспортировать переменные в shell перед docker compose.
    # -------------------------------------------------------------------------
    user: "1000:1000"

    # -------------------------------------------------------------------------
    # Дополнительные группы для доступа к /dev/ttyACM*, /dev/can*, /dev/vcan*
    # без root. Имя группы резолвится внутри образа (в Debian есть dialout).
    # Если на хосте у устройства другая группа — добавьте числовой GID, например:
    #   group_add:
    #     - "20"      # часто dialout на хосте
    #     - "996"     # пример: замените на `stat -c '%g' /dev/vcan0`
    # -------------------------------------------------------------------------
    group_add:
      - dialout

    # -------------------------------------------------------------------------
    # Явный проброс символьных устройств (если без них нет доступа даже с group_add).
    # Раскомментируйте нужные строки и убедитесь, что файлы есть на хосте.
    # -------------------------------------------------------------------------
    # devices:
    #   - /dev/vcan0:/dev/vcan0
    #   - /dev/can0:/dev/can0
    #   - /dev/ttyACM0:/dev/ttyACM0

    restart: unless-stopped
