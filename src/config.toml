# =============================================================================
# Конфигурация драйвера LED-табло (CAN / ISO-TP). Один контроллер — одно табло.
# =============================================================================

[can]
channel = "can0"
bitrate = 500000

[iso-tp]
rx_flowcontrol_timeout = 5000
rx_consecutive_frame_timeout = 5000
stmin = 1
blocksize = 64
use_stack_sleep_time = true
loop_sleep_sec = 0.00001

[logs]
dir = "../logs"
file = "tablo.log"
count = 5
max_size = 1048576

[TextIn]
path = "../data/text-in.json"
font = "../data/DejaVuSans.ttf"

[api-server]
host = "0.0.0.0"
port = 7070

[display]
display-id = "front-display"

# 0x000007E0 - ID для отправки для табло 64x128
# 0x000007E8 - ответ о готовности.
# 0x000007E1 - ID для отправки для табло 64x256
# 0x000007E9 - ответ о готовности. 64x256

sender_tx_id = 0x000007E1
sender_rx_id = 0x000007E9
width = 256
height = 64

animate = false                 # режим 0x0002 при переполнении / усечение при false (по умолчанию: true)
debug = true                  # лог текста по зонам (по умолчанию: false)

# Маршрут слева, две строки справа (аналог прежнего RouteAndTwoLinesTablo)
[display.1]
bg = 0
fg = 2
font = 1
text_scale_x = 0.5
area = { x = 0, y = 0, w = 80, h = 64 }
padding = { t = 2, r = 2, b = 2, l = 2 }

[display.2]
bg = 0
fg = 3
font = 1
text_scale_x = 1.0
area = { x = 80, y = 0, w = 176, h = 32 }
padding = { t = 2, r = 2, b = 2, l = 2 }

[display.3]
bg = 0
fg = 5
font = 1
text_scale_x = 1.0
area = { x = 80, y = 32, w = 176, h = 32 }
padding = { t = 2, r = 2, b = 2, l = 2 }
