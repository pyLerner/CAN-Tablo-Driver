# =============================================================================
# Конфигурация драйвера LED-табло (CAN / ISO-TP). Один контроллер — одно табло.
# =============================================================================
# 64*128 (2x2) Задний маршрутоуказатель
# ID для отправки на табло
# 0x000007E0
# ID для получения подтверждения
# 0x000007E8

# 64*256 (2x4)  Переднее табло
# ID для отправки на табло
# 0x000007E1
# ID для получения подтверждения
# 0x000007E9

# 32*192 (1x3) (внутреннее 1)
# ID для отправки на табло
# 0x000007E2
# ID для получения подтверждения
# 0x000007EA

# 64*384 (1x6) (Боковое 1)
# ID для отправки на табло
# 0x000007E3
# ID для получения подтверждения
# 0x000007EB

# 32*192 (1x3) (внутреннее 2)
# ID для отправки на табло
# 0x000007E4
# ID для получения подтверждения
# 0x000007EC

# 64*384 (1x6) (Боковое 2)
# ID для отправки на табло
# 0x000007E5
# ID для получения подтверждения
# 0x000007ED

[can]
channel = "can0"
bitrate = 500000

[iso-tp]
rx_flowcontrol_timeout = 5000
rx_consecutive_frame_timeout = 5000
stmin = 1
blocksize = 64
use_stack_sleep_time = true
loop_sleep_sec = 0.00001

[logs]
dir = "../logs"
file = "tablo.log"
count = 5
max_size = 1048576

[TextIn]
path = "../data/text-in.json"
font = "../data/DejaVuSans.ttf"

[api-server]
host = "0.0.0.0"
port = 7070

[display]
display-id = "side-display-1"

# Первое боковое
sender_tx_id = 0x000007E3
sender_rx_id = 0x000007EB

# Второе боковое
# sender_tx_id = 0x000007E5
# sender_rx_id = 0x000007ED

width = 384
height = 64

# Маршрут слева, две строки справа (аналог прежнего RouteAndTwoLinesTablo)
[display.1]
bg = 0
fg = 2
font = 1
text_scale_x = 1
area = { x = 0, y = 0, w = 128, h = 64 }
padding = { t = 2, r = 2, b = 2, l = 2 }

# Первая строка - начальная остановка
[display.2]
bg = 0
fg = 3
font = 1
text_scale_x = 1.0
area = { x = 80, y = 0, w = 256, h = 32 }
padding = { t = 2, r = 2, b = 2, l = 2 }

# Вторая строка 
# [display.3] для отображения конечной остановки
# [display.4] для отображения оставшихся остановок

[display.4]
bg = 0
fg = 5
font = 1
text_scale_x = 1.0
area = { x = 80, y = 32, w = 256, h = 32 }
padding = { t = 2, r = 2, b = 2, l = 2 }

